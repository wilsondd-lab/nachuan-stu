<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">纳川 Skills</title>
  <desc id="desc">在 TRAE CN 中把一次 AI 对话变成可以保存、复述和回看的学习资料。</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#D77A43"/>
    </marker>
  </defs>

  <rect width="1200" height="390" rx="28" fill="#F6EFE4"/>
  <path d="M0 18 Q0 0 18 0 H1182 Q1200 0 1200 18 V22 H0 Z" fill="#D77A43"/>

  <g id="title-block" transform="translate(64 62)">
    <text x="0" y="0" fill="#A96640" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="3">TRAE CN · LEARNING ENHANCEMENT</text>
    <text x="0" y="82" fill="#302B27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="70" font-weight="800">纳川 Skills</text>
    <text x="0" y="132" fill="#5F554D" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="27" font-weight="500">把一次 AI 对话，变成能保存、复述、回看的学习资料</text>

    <g transform="translate(0 190)">
      <rect width="210" height="52" rx="26" fill="#FFFFFF"/>
      <circle cx="28" cy="26" r="7" fill="#D77A43"/>
      <text x="48" y="34" fill="#302B27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="650">纳川图解</text>

      <rect x="226" width="238" height="52" rx="26" fill="#FFFFFF"/>
      <circle cx="254" cy="26" r="7" fill="#6F8075"/>
      <text x="274" y="34" fill="#302B27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="650">纳川教学视频</text>
    </g>

    <text x="0" y="294" fill="#95877B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">2 REUSABLE SKILLS  ·  JUNIOR &amp; SENIOR HIGH SCHOOL</text>
  </g>

  <g id="learning-loop" transform="translate(760 58)">
    <rect width="376" height="274" rx="24" fill="#FFFCF7" stroke="#DED1C2" stroke-width="2"/>
    <text x="28" y="38" fill="#95877B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">ONE LEARNING LOOP</text>

    <rect x="28" y="58" width="320" height="48" rx="12" fill="#F1E3D3"/>
    <text x="48" y="89" fill="#4B4038" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="19" font-weight="650">“帮我讲清楚速度与加速度”</text>

    <path d="M188 112 V136" stroke="#D77A43" stroke-width="3" marker-end="url(#arrow)"/>

    <g transform="translate(28 148)">
      <rect width="144" height="62" rx="14" fill="#FFFFFF" stroke="#D77A43" stroke-width="2"/>
      <text x="72" y="27" text-anchor="middle" fill="#A96640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16" font-weight="700">图解</text>
      <text x="72" y="48" text-anchor="middle" fill="#95877B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="14">看见区别</text>
    </g>

    <g transform="translate(204 148)">
      <rect width="144" height="62" rx="14" fill="#FFFFFF" stroke="#6F8075" stroke-width="2"/>
      <text x="72" y="27" text-anchor="middle" fill="#596B60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="16" font-weight="700">教学视频</text>
      <text x="72" y="48" text-anchor="middle" fill="#95877B" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="14">看懂过程</text>
    </g>

    <path d="M188 216 V232" stroke="#D77A43" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="188" y="260" text-anchor="middle" fill="#302B27" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="18" font-weight="700">复述 · 练习 · 教材核对</text>
  </g>
</svg>
